name: ci

on:
  push:
  pull_request:

jobs:
  build-and-unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run unit tests (your self-written runner)
        run: |
          set -e
          BIN="$(find build -type f -name 'unitTests*' -executable | head -n 1)"
          if [ -z "$BIN" ]; then
            echo "ERROR: unitTests executable not found under build/"
            echo "Here are executables I *did* find:"
            find build -type f -executable -maxdepth 6 -print || true
            exit 1
          fi
          echo "Running: $BIN"
          "$BIN"
